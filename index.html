<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Rock</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Daily Rock</h1>
        <div class="date-time">
          <div id="current-date"></div>
          <div id="current-time"></div>
        </div>
      </header>

      <section class="timeline-card" aria-label="Daily timeline">
        <div id="timeline" class="timeline">
          <div id="time-labels" class="time-labels"></div>
          <div id="grid-lines" class="grid-lines"></div>
          <div class="five-minute-drops"></div>
          <div id="ghost-layer" class="ghost-layer" aria-hidden="true"></div>
          <div id="placed-layer" class="placed-layer"></div>
        </div>
      </section>

      <nav class="category-bar" aria-label="Categories">
        <div id="category-tabs" class="category-tabs"></div>
        <div class="activity-panel">
          <div id="panel-title" class="panel-title"></div>
          <div id="activities" class="activities"></div>
        </div>
      </nav>

      <div id="popup-backdrop" class="popup-backdrop hidden">
        <div class="edit-popup">
          <button id="plus-five">+5</button>
          <button id="minus-five">-5</button>
          <button id="delete-tile">Delete</button>
          <button id="done-edit">Done</button>
        </div>
      </div>
    </main>
    <script src="/src/main.js"></script>
  </body>
</html>
